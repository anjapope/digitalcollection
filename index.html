<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArchIvory Digital Exhibition | Welcome</title>
  <style>
    body {
      background: #111;
      color: #f5f5f5;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .museum-img {
      max-width: 420px;
      width: 90vw;
      margin-bottom: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 32px #000a;
      border: 2px solid #222;
      background: #222;
    }
    .welcome-message {
      font-size: 1.35rem;
      max-width: 600px;
      text-align: center;
      margin-bottom: 2.5rem;
      color: #e0e0e0;
    }
    .enter-btn {
      background: #fff;
      color: #111;
      border: none;
      padding: 0.85em 2.5em;
      font-size: 1.2rem;
      border-radius: 2em;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 2px 12px #0006;
      transition: background 0.2s, color 0.2s;
    }
    .enter-btn:hover, .enter-btn:focus {
      background: #e0e0e0;
      color: #000;
      outline: none;
    }
  </style>
</head>
<body>
  <img src="/assets/img/archivory%20home%20page%20image.png" alt="ArchIvory home page image" class="museum-img">
  <div class="welcome-message">
    <h1 style="font-weight:700; letter-spacing:0.03em; margin-bottom:0.5em;">Welcome to the ArchIvory Digital Exhibition</h1>
    <p>Step inside to explore the intertwined stories of elephants, ivory, and human societies across time and place. Begin your journey through four unique pathways, each offering a new perspective on the meanings and histories of ivory.</p>
  </div>
  <a href="/pages/vestibule.html"><button class="enter-btn" aria-label="Enter the exhibition">Enter</button></a>
</body>
</html>
